version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
      - "8501:8501"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - TOMORROW_IO_API_KEY=${TOMORROW_IO_API_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
