name: Weekly Pipeline Run

on:
  schedule:
    - cron: '30 0 * * 1'  # Monday 00:30 UTC = 06:00 IST
  workflow_dispatch: {}    # Manual trigger from GitHub UI

jobs:
  trigger-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Wake HF Space
        run: |
          echo "Waking Space..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/jtlevine/ai-weather-pipeline-runner/restart" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            || true
          echo "Wake POST sent. Health-check loop will wait for the Space to come up."

      - name: Wait for Space to be healthy
        run: |
          # Poll up to 10 minutes — A100-large cold start typically takes 5-8 min.
          # Fixed 90s sleep was the silent-failure root cause (5 weeks of failed Monday cron).
          MAX_WAIT=600
          INTERVAL=20
          ELAPSED=0
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            if curl -sf "https://jtlevine-ai-weather-pipeline-runner.hf.space/health" > /dev/null; then
              echo "[${ELAPSED}s] Space is healthy"
              exit 0
            fi
            echo "[${ELAPSED}s] not yet ready"
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Space never came up within ${MAX_WAIT}s"
          exit 1

      - name: Trigger pipeline run
        run: |
          echo "Triggering pipeline..."
          # Capture both response body and HTTP status — bail loudly if not 2xx
          # or if the body isn't valid JSON. Without these checks the workflow
          # silently proceeds when the Space serves an HF 404 HTML page (which
          # is what happened every week for 5 weeks).
          HTTP_STATUS=$(curl -s -o /tmp/trigger.out -w '%{http_code}' \
            -X POST "https://jtlevine-ai-weather-pipeline-runner.hf.space/api/pipeline/trigger")
          echo "HTTP $HTTP_STATUS"
          echo "Body:"
          cat /tmp/trigger.out
          echo
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Trigger returned non-2xx status — aborting."
            exit 1
          fi
          if ! python3 -c "import json,sys; json.load(open('/tmp/trigger.out'))" 2>/dev/null; then
            echo "Trigger response is not valid JSON (likely an HF 404 HTML page) — aborting."
            exit 1
          fi

      - name: Wait for pipeline completion
        run: |
          MAX_WAIT=1200  # 20 minutes
          ELAPSED=0
          INTERVAL=30
          while [ $ELAPSED -lt $MAX_WAIT ]; do
            RESULT=$(curl -s "https://jtlevine-ai-weather-pipeline-runner.hf.space/api/pipeline/status" 2>/dev/null)
            RUNNING=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('running',True))" 2>/dev/null || echo "true")
            echo "[$ELAPSED s] Running: $RUNNING"
            if [ "$RUNNING" = "False" ]; then
              echo "Pipeline finished!"
              echo "$RESULT" | python3 -m json.tool 2>/dev/null || echo "$RESULT"
              STATUS=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin).get('last_result') or {}; print(r.get('status','unknown'))" 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "failed" ]; then
                echo "Pipeline failed!"
                exit 1
              fi
              exit 0
            fi
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done
          echo "Timed out waiting for pipeline"
          exit 1

      - name: Pause Pipeline Space
        if: always()
        run: |
          echo "Pausing Pipeline Space to stop billing..."
          curl -s -X POST \
            "https://huggingface.co/api/spaces/jtlevine/ai-weather-pipeline-runner/pause" \
            -H "Authorization: Bearer ${{ secrets.HF_TOKEN }}" \
            || true
          echo "Space paused."
