name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-timeout

      - name: Run tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          ANTHROPIC_API_KEY: test-key
          TOMORROW_IO_API_KEY: test-key
          JWT_SECRET_KEY: test-secret
        run: pytest tests/ -v --tb=short -x --timeout=60

      - name: Lint
        run: |
          pip install ruff
          ruff check src/ scripts/ tests/ --select E,F,W || true

      - name: Type check (basic)
        run: |
          pip install pyright
          pyright src/models.py src/api.py --level basic || true

      - name: Scan for hardcoded secrets
        run: |
          ! grep -rn "sk-ant-api\|hf_[A-Za-z0-9]\{20\}\|gho_[A-Za-z0-9]\{20\}" \
            --include="*.py" --include="*.toml" --include="*.yml" --include="*.yaml" \
            --exclude-dir=.github . || \
            (echo "ERROR: Possible hardcoded secrets found" && exit 1)

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --desc || true
